<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NODE — Network Of Domain Experts</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg" />
    <meta
      name="description"
      content="AI 도메인 전문가 네트워크를 인터랙티브 3D 지식그래프로 시각화하는 제로빌드 정적 대시보드"
    />
    <link rel="canonical" href="https://sguys99.github.io/node/" />

    <!-- 링크 공유 미리보기: Open Graph (카카오톡·슬랙·페이스북 등) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NODE" />
    <meta property="og:title" content="NODE — Network Of Domain Experts" />
    <meta
      property="og:description"
      content="AI 도메인 전문가 네트워크를 인터랙티브 3D 지식그래프로 시각화하는 대시보드"
    />
    <meta property="og:url" content="https://sguys99.github.io/node/" />
    <meta property="og:image" content="https://sguys99.github.io/node/assets/og/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NODE 오빗 로고와 서비스명" />
    <meta property="og:locale" content="ko_KR" />

    <!-- 링크 공유 미리보기: Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NODE — Network Of Domain Experts" />
    <meta
      name="twitter:description"
      content="AI 도메인 전문가 네트워크를 인터랙티브 3D 지식그래프로 시각화하는 대시보드"
    />
    <meta name="twitter:image" content="https://sguys99.github.io/node/assets/og/og-image.png" />

    <!-- 웹폰트: Inter(Latin) + Noto Sans KR(한글) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- 디자인 토큰 → CSS 변수 매핑 (Phase 1) -->
    <link rel="stylesheet" href="css/tokens.css" />
    <!-- 레이아웃·패널·반응형 (Phase 1) -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- CDN 라이브러리 (제로빌드, ES Modules) -->
    <!-- three·3d-force-graph·three-spritetext·UnrealBloomPass는 render.js에서 esm.sh로
         ESM import한다(?deps=three@0.180.0 으로 단일 three 인스턴스 공유). -->
    <!-- PapaParse (UMD 전역 Papa) — gviz CSV 파싱(독립 라이브러리) -->
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  </head>

  <body>
    <!-- ============ HEADER ============ -->
    <header class="app-header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <circle cx="24" cy="24" r="15" fill="none" stroke="var(--color-mute)" stroke-width="2" />
          <circle cx="34.6" cy="13.4" r="3" fill="var(--color-body)" />
          <circle cx="24" cy="24" r="5" fill="var(--color-primary)" />
        </svg>
        <span class="brand-name">NODE</span>
        <span class="brand-tagline">Network Of Domain Experts</span>
      </div>
      <div class="header-meta">
        <span id="node-count" class="node-count">— nodes</span>
        <span id="data-source-badge" class="source-badge" data-source="">…</span>
        <a
          class="repo-link"
          href="https://github.com/sguys99/node"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub 저장소 열기"
          title="GitHub 저장소"
        >
          <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </a>
      </div>
    </header>

    <!-- ============ MAIN (3분할) ============ -->
    <main class="app-main">
      <!-- 좌측: 인력 상세 패널 (Phase 6) -->
      <aside id="detail-panel" class="panel panel-left" aria-label="인력 상세">
        <p class="panel-eyebrow">상세</p>
        <p id="detail-placeholder" class="panel-placeholder">
          노드를 선택하면 상세 정보가 표시됩니다
        </p>
        <div id="detail-content" class="detail-content" hidden></div>
      </aside>

      <!-- 중앙: 인터랙티브 3D 지식그래프 캔버스 -->
      <section class="graph-wrap" aria-label="지식그래프">
        <div id="graph" class="graph-canvas"></div>
        <!-- 폴백 실패 시 에러 안내 UI (Phase 2) -->
        <div id="error-ui" class="error-ui" hidden>
          <p class="error-msg">데이터를 불러오지 못했습니다.</p>
          <button id="retry-btn" type="button" class="retry-btn">다시 시도</button>
        </div>
      </section>

      <!-- 우측: 시각화 설정 패널 (Phase 6) -->
      <aside id="settings-panel" class="panel panel-right" aria-label="Visualization settings">
        <!-- 모바일 전용 하단 핸들 바(peek) — 탭하면 시트 펼침. 데스크톱/태블릿은 CSS로 숨김 -->
        <button id="settings-handle" type="button" class="panel-handle"
                aria-controls="settings-panel" aria-expanded="false">
          <span class="panel-handle-grip" aria-hidden="true"></span>
          <span class="panel-handle-label">Settings</span>
        </button>
        <p class="panel-eyebrow">Settings</p>

        <fieldset class="settings-group">
          <legend>Labels</legend>
          <label><input type="checkbox" name="label" value="name" checked /> Name</label>
          <label><input type="checkbox" name="label" value="career" /> Career</label>
          <label><input type="checkbox" name="label" value="nickname" /> Nickname</label>
          <label><input type="checkbox" name="label" value="interest" /> Interests</label>
          <label><input type="checkbox" name="label" value="affiliation" checked /> Affiliation</label>
          <!-- 협업 엣지 표시 토글 — 노드간 밝은 오렌지 협력 관계(name="edge"로 엣지 가시성 제어). 디폴트 체크. -->
          <label><input type="checkbox" name="edge" value="collaboration" checked /> Collaboration</label>
        </fieldset>

        <fieldset class="settings-group">
          <legend>Edges</legend>
          <label><input type="checkbox" name="edge" value="hub" checked /> Hub</label>
          <label><input type="checkbox" name="edge" value="affiliation" checked /> Affiliation</label>
          <label><input type="checkbox" name="edge" value="interest" /> Interest</label>
        </fieldset>

        <fieldset class="settings-group">
          <legend>View</legend>
          <button id="zoom-reset" type="button" class="ctrl-btn">Reset view</button>
        </fieldset>
      </aside>
    </main>

    <!-- ============ FOOTER ============ -->
    <footer class="app-footer">
      <span class="footer-brand">
        <svg class="footer-mark" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <circle cx="24" cy="24" r="15" fill="none" stroke="var(--color-mute)" stroke-width="2" />
          <circle cx="34.6" cy="13.4" r="3" fill="var(--color-body)" />
          <circle cx="24" cy="24" r="5" fill="var(--color-primary)" />
        </svg>
        NODE
      </span>
      <span>Source: Google Sheet</span>
      <span>Owner: Kwang Myung Yu</span>
      <span>Update: 2026-06</span>
    </footer>

    <!-- 엔트리 (Phase 5: load → normalize → buildGraph → render 오케스트레이션) -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
